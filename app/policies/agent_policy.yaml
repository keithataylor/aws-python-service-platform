version: "1.0"
default_decision: deny

rules:
  - rule_id: allow_public_docs_read
    effect: allow
    tool_name: docs_tool
    action: tool.read
    resource: public.docs
    rationale: POLICY_ALLOW_PUBLIC_DOCS_READ
    meta:
      description: Allow read access to public documentation only.
    constraints:
      - parameter: document_visibility
        operator: equals
        value: public
    obligations:
      - obligation_type: audit_log
        parameters:
          level: decision
          