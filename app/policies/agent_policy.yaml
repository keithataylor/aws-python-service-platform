version: "1.0"
default_decision: deny

rules:
  - rule_id: allow_public_docs_read
    when:
      server_name: docs_mcp
      tool_name: docs_tool
      action: tool.read
      resource: public.docs
      constraints:
        - source: parameters
          field: document_visibility
          operator: equals
          value: public
    then:
      effect: allow
      rationale: POLICY_ALLOW_PUBLIC_DOCS_READ
      obligations:
        - obligation_type: audit_log
          parameters:
            level: decision

